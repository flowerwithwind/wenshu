version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.org}
        APT_MIRROR: ${APT_MIRROR:-deb.debian.org}
        HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    container_name: smartqa-backend
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-large-zh-v1.5}
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
      - HOST=0.0.0.0
      - PORT=8000
      # 浏览器 + credentials 不能用 *；本机开发默认放行前端端口
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173}
      - DATASET_DIR=./data/datasets
      - VECTOR_DB_PATH=./data/vector_db
      - CHROMA_PERSIST_DIR=./data/chroma_db
    volumes:
      # 不要整目录覆盖 /app/data（会遮住镜像内 CSV 数据集）
      - backend-chroma:/app/data/chroma_db
      - backend-vector:/app/data/vector_db
      - backend-conversations:/app/data/conversations
      - backend-user-dbs:/app/data/user_dbs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    container_name: smartqa-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-chroma:
  backend-vector:
  backend-conversations:
  backend-user-dbs:
