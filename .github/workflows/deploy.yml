name: Deploy SmartQA

# 推送到 master/main 自动：测试 → 推镜像 → 上传服务器 → 拉起容器
# 也可在 Actions 页手动 Run workflow
on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "跳过测试（仅紧急热修，默认 false）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  test:
    name: Test before deploy
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.skip_tests != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-ml.txt

      - name: Run backend tests
        working-directory: ./backend
        run: python -m pytest tests/ -x --tb=short

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

  deploy:
    name: Build push and remote deploy
    needs: [test]
    # test 被跳过时（手动 skip_tests）仍允许部署
    if: |
      always() &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}

    steps:
      - uses: actions/checkout@v4

      - name: Show deploy mode (no secret values)
        run: |
          echo "Docker Hub user configured: $([ -n \"$DOCKER_USERNAME\" ] && echo yes || echo NO)"
          echo "SERVER_HOST configured: $([ -n \"$SERVER_HOST\" ] && echo yes || echo NO)"
          echo "SERVER_USER configured: $([ -n \"$SERVER_USER\" ] && echo yes || echo NO)"
          echo "SERVER_PASSWORD configured: $([ -n \"$SERVER_PASSWORD\" ] && echo yes || echo NO)"
          echo "DEEPSEEK_API_KEY configured: $([ -n \"$DEEPSEEK_API_KEY\" ] && echo yes || echo no)"
          echo "Commit: ${GITHUB_SHA}"

      - name: Require Docker Hub credentials
        if: env.DOCKER_USERNAME == '' || env.DOCKER_PASSWORD == ''
        run: |
          echo "::error::请在仓库 Settings → Secrets and variables → Actions 配置 DOCKER_USERNAME、DOCKER_PASSWORD"
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/smartqa-backend:latest
            ${{ env.DOCKER_USERNAME }}/smartqa-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/smartqa-frontend:latest
            ${{ env.DOCKER_USERNAME }}/smartqa-frontend:${{ github.sha }}
          build-args: |
            CACHEBUST=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------- 远程自动部署（需 SERVER_* Secrets）----------
      - name: Require SSH secrets for remote deploy
        if: env.SERVER_HOST != '' && (env.SERVER_USER == '' || env.SERVER_PASSWORD == '')
        run: |
          echo "::error::SERVER_HOST 已配置，请同时配置 SERVER_USER、SERVER_PASSWORD"
          exit 1

      - name: Prepare deploy bundle
        if: env.SERVER_HOST != ''
        run: |
          set -euo pipefail
          rm -rf deploy-bundle
          mkdir -p deploy-bundle
          cp deploy/docker-compose.prod.yml deploy-bundle/docker-compose.yml
          cp deploy/remote-up.sh deploy-bundle/remote-up.sh
          chmod +x deploy-bundle/remote-up.sh

          JWT_VAL="${JWT_SECRET_KEY:-smartqa-prod-${GITHUB_SHA}}"
          BASE_URL="${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
          CORS_VAL="${CORS_ORIGINS:-*}"

          # 注意：不要缩进 .env 内容
          cat > deploy-bundle/.env <<EOF
          DOCKER_USERNAME=${DOCKER_USERNAME}
          IMAGE_TAG=latest
          HTTP_PORT=80
          DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          DEEPSEEK_BASE_URL=${BASE_URL}
          DEEPSEEK_MODEL=deepseek-chat
          JWT_SECRET_KEY=${JWT_VAL}
          CORS_ORIGINS=${CORS_VAL}
          EMBEDDING_MODEL=BAAI/bge-large-zh-v1.5
          HF_ENDPOINT=https://hf-mirror.com
          RETRIEVER_MODE=hybrid
          EOF
          sed -i 's/^[[:space:]]*//' deploy-bundle/.env

          printf '%s' "${DOCKER_PASSWORD}" > deploy-bundle/.docker_password
          chmod 600 deploy-bundle/.env deploy-bundle/.docker_password
          tar -C deploy-bundle -czf deploy-bundle.tgz .
          ls -la deploy-bundle deploy-bundle.tgz

      - name: Ensure remote directory exists
        if: env.SERVER_HOST != ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          port: ${{ env.SERVER_PORT != '' && env.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            if [ -d /opt/smartqa ] && [ -w /opt/smartqa ]; then
              mkdir -p /opt/smartqa
            else
              sudo mkdir -p /opt/smartqa
              sudo chown -R "$(id -un):$(id -gn)" /opt/smartqa || sudo chown -R ubuntu:ubuntu /opt/smartqa || true
            fi
            mkdir -p /opt/smartqa
            ls -la /opt/smartqa || true

      - name: Upload bundle to server
        if: env.SERVER_HOST != ''
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          port: ${{ env.SERVER_PORT != '' && env.SERVER_PORT || 22 }}
          source: "deploy-bundle.tgz"
          target: "/opt/smartqa"
          overwrite: true

      - name: Extract pull and start on server
        if: env.SERVER_HOST != ''
        uses: appleboy/ssh-action@v1.2.0
        env:
          REMOTE_DOCKER_PASS: ${{ env.DOCKER_PASSWORD }}
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          port: ${{ env.SERVER_PORT != '' && env.SERVER_PORT || 22 }}
          envs: REMOTE_DOCKER_PASS
          script_stop: true
          # backend 镜像含 torch，国内 mirror 拉取常需 30–90 分钟
          command_timeout: 90m
          script: |
            set -euo pipefail
            cd /opt/smartqa
            ls -la

            test -f deploy-bundle.tgz
            tar -xzf deploy-bundle.tgz
            rm -f deploy-bundle.tgz
            chmod +x remote-up.sh
            ls -la

            test -f docker-compose.yml
            test -f .env
            test -f remote-up.sh

            # 国内机 login 常超时，可不传密码；mirror 匿名 pull 公开仓库
            export DOCKER_PASSWORD="${REMOTE_DOCKER_PASS:-}"
            ./remote-up.sh

            echo "==== containers ===="
            docker ps --filter name=smartqa --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            echo "==== health ===="
            curl -fsS http://127.0.0.1:8000/api/health || echo "(health not ready yet — first boot may download models)"
            echo "Remote deploy finished OK"

      - name: Only Hub push (no SERVER_HOST)
        if: env.SERVER_HOST == ''
        run: |
          echo "::warning::未检测到 SERVER_HOST Secret，只完成了 Docker Hub 推送，没有 SSH 部署。"
          echo "请到 Settings → Secrets 配置: SERVER_HOST, SERVER_USER, SERVER_PASSWORD"
          echo "镜像: ${{ env.DOCKER_USERNAME }}/smartqa-backend:latest"
          echo "镜像: ${{ env.DOCKER_USERNAME }}/smartqa-frontend:latest"
