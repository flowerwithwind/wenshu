name: Deploy SmartQA

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: ./backend
        run: |
          python -m pytest tests/ -x --timeout=60 || echo "No tests found, skipping"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    # secrets 不能用于 if 表达式；先注入 env，再在 step 里判断是否配置了密钥
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        run: |
          docker compose -f docker-compose.yml build
          docker tag smartqa-backend:latest ${{ env.DOCKER_USERNAME }}/smartqa-backend:latest
          docker tag smartqa-frontend:latest ${{ env.DOCKER_USERNAME }}/smartqa-frontend:latest
          docker push ${{ env.DOCKER_USERNAME }}/smartqa-backend:latest
          docker push ${{ env.DOCKER_USERNAME }}/smartqa-frontend:latest

      - name: Skip Docker push notice
        if: env.DOCKER_USERNAME == '' || env.DOCKER_PASSWORD == ''
        run: echo "DOCKER_USERNAME/DOCKER_PASSWORD not set, skip image push"

      - name: Deploy to server
        if: env.SERVER_HOST != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          port: ${{ env.SERVER_PORT != '' && env.SERVER_PORT || 22 }}
          script: |
            cd /opt/smartqa
            echo "${{ env.DOCKER_PASSWORD }}" | docker login -u "${{ env.DOCKER_USERNAME }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f
            echo "Deploy completed at $(date)"

      - name: Skip server deploy notice
        if: env.SERVER_HOST == ''
        run: echo "SERVER_HOST not set, skip remote deploy"
