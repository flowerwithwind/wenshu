version: "3.8"

# 生产编排：与 GitHub Actions 推送的 Docker Hub 镜像对齐
# 需环境变量: DOCKER_USERNAME, DEEPSEEK_API_KEY, ...

services:
  backend:
    image: ${DOCKER_USERNAME:-smartqa}/smartqa-backend:latest
    container_name: smartqa-backend
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-large-zh-v1.5}
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
      - RETRIEVER_MODE=${RETRIEVER_MODE:-hybrid}
      - HOST=0.0.0.0
      - PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
    volumes:
      - smartqa-chroma:/app/data/chroma_db
      - smartqa-vector:/app/data/vector_db
      - smartqa-conversations:/app/data/conversations
      - smartqa-user-dbs:/app/data/user_dbs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ${DOCKER_USERNAME:-smartqa}/smartqa-frontend:latest
    container_name: smartqa-frontend
    ports:
      - "80:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  smartqa-chroma:
  smartqa-vector:
  smartqa-conversations:
  smartqa-user-dbs:
